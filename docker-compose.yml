# Docker Compose file for wifisync-server
#
# Usage:
#   docker compose up -d
#
# The server will be available at http://localhost:8080
#
# For production, set JWT_SECRET to a secure random value:
#   JWT_SECRET=$(openssl rand -base64 32) docker compose up -d
#

services:
  wifisync-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: wifisync-server:latest
    container_name: wifisync-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - wifisync-data:/data
    environment:
      # Database location (inside container)
      - DATABASE_URL=sqlite:/data/wifisync.db?mode=rwc
      # Bind address
      - BIND_ADDRESS=0.0.0.0:8080
      # Log level: error, warn, info, debug, trace
      - RUST_LOG=info
      # JWT secret - CHANGE THIS IN PRODUCTION!
      # Generate with: openssl rand -base64 32
      - JWT_SECRET=${JWT_SECRET:-}
      # JWT token expiration in hours (default: 168 = 7 days)
      - JWT_EXPIRATION_HOURS=168
    healthcheck:
      test: ["CMD", "sqlite3", "/data/wifisync.db", "SELECT 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wifisync-data:
    name: wifisync-data
