name: E2E Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual trigger for full suite (including Android)
  workflow_dispatch:
    inputs:
      run_android:
        description: 'Run Android E2E tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  cli-e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build CLI (release)
        run: cargo build --release -p wifisync

      - name: Build Docker image
        run: docker compose -f docker-compose.yml -f tests/e2e/docker-compose.e2e.yml build

      - name: Start E2E server
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            up -d --wait
        env:
          E2E_SERVER_PORT: 18080

      - name: Wait for server health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health; then
              echo "Server healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          docker compose -f docker-compose.yml -f tests/e2e/docker-compose.e2e.yml logs
          exit 1

      - name: Run CLI E2E tests
        run: cargo test --test e2e_cli -- --test-threads=1
        env:
          E2E_SERVER_URL: http://localhost:18080
          E2E_CLI_BINARY: ${{ github.workspace }}/target/release/wifisync

      - name: Server logs (on failure)
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            logs --tail=100

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            down -v --remove-orphans

  cross-device-e2e:
    name: Cross-Device E2E Tests (CLI + Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_android == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build CLI (release)
        run: cargo build --release -p wifisync

      - name: Build Docker image and start server
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            up -d --build --wait
        env:
          E2E_SERVER_PORT: 18080

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run full E2E suite
        run: ./tests/e2e/run-e2e.sh --keep-server
        env:
          E2E_SERVER_PORT: 18080
          E2E_SKIP_BUILD: 1

      - name: Server logs (on failure)
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            logs --tail=100

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-test-reports
          path: android/app/build/reports/androidTests/connected/

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/e2e/docker-compose.e2e.yml \
            down -v --remove-orphans
